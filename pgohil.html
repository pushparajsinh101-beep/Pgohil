<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdminLTE Dashboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css" />
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
  <div class="app-wrapper">

    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
              <i class="bi bi-list"></i>
            </a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item me-3 text-secondary fw-bold">
            <i class="bi bi-person-circle me-1"></i> {{ user_name }}
          </li>
          <li class="nav-item">
            <a href="/logout" class="btn btn-outline-danger btn-sm fw-bold shadow-sm px-3">
              <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
      <div class="sidebar-brand">
        <a href="#" class="brand-link">
          <span class="brand-text fw-light">My Dashboard</span>
        </a>
      </div>
      <div class="sidebar-wrapper">
        <nav class="mt-2">
          <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="menu">
            
            <li class="nav-item">
              <a href="#" class="nav-link active" id="dashboard-nav-btn">
                <i class="nav-icon bi bi-speedometer"></i>
                <p>Dashboard</p>
              </a>
            </li>

            <li class="nav-item">
              <a href="#" class="nav-link">
                <i class="nav-icon bi bi-bar-chart"></i>
                <p>Reports</p>
              </a>
            </li>

            <li class="nav-item">
              <a href="#" class="nav-link" id="user-management-nav-btn">
                <i class="nav-icon bi bi-people"></i>
                <p>User Management</p>
              </a>
            </li>

          </ul>
        </nav>
      </div>
    </aside>

    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <h3 class="mb-0" id="page-title">Dashboard</h3>
        </div>
      </div>
      
      <div class="app-content">
        <div class="container-fluid">

          <div id="panel-dashboard" class="content-panel">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title m-0">Welcome</h5>
              </div>
              <div class="card-body">
                Hello, <strong>{{ user_name }}</strong>! Edit this file to start building your dashboard metrics.
              </div>
            </div>
          </div>

          <div id="panel-user-management" class="content-panel d-none">
            <div class="card">
              <div class="card-header">
                <h5 class="card-title m-0">Registered User Details</h5>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive">
                  <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                      <tr>
                        <th>ID</th>
                        <th>Full Name</th>
                        <th>Email Address</th>
                        <th>Role</th>
                        <th style="width: 200px;">Actions</th>
                      </tr>
                    </thead>
                    <tbody id="user-table-body">
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/js/adminlte.min.js"></script>

  <script>
    function showPanel(panelId, pageTitle) {
      document.querySelectorAll('.content-panel').forEach(panel => panel.classList.add('d-none'));
      document.querySelectorAll('.sidebar-menu .nav-link').forEach(link => link.classList.remove('active'));
      
      document.getElementById(panelId).classList.remove('d-none');
      document.getElementById('page-title').innerText = pageTitle;
    }

    document.getElementById('dashboard-nav-btn').addEventListener('click', function() {
      this.classList.add('active');
      showPanel('panel-dashboard', 'Dashboard');
    });

    document.getElementById('user-management-nav-btn').addEventListener('click', function() {
      this.classList.add('active');
      showPanel('panel-user-management', 'User Management');
      loadUserDetails();
    });

    // API: Load user data rows dynamically
    function loadUserDetails() {
      fetch('/api/users')
        .then(response => response.json())
        .then(users => {
          let tbody = document.getElementById('user-table-body');
          tbody.innerHTML = '';
          if(users.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-3">No registered users found.</td></tr>`;
            return;
          }
          users.forEach(user => {
            tbody.innerHTML += `<tr>
              <td>${user.id}</td>
              <td>${user.name}</td>
              <td>${user.email}</td>
              <td><span class="badge bg-primary text-capitalize">${user.role}</span></td>
              <td>
                <button class="btn btn-warning btn-sm me-1 fw-bold text-dark shadow-sm" onclick="editUser(${user.id}, '${user.name}')">
                  <i class="bi bi-pencil-fill me-1"></i>Edit
                </button>
                <button class="btn btn-danger btn-sm fw-bold shadow-sm" onclick="deleteUser(${user.id})">
                  <i class="bi bi-trash-fill me-1"></i>Delete
                </button>
              </td>
            </tr>`;
          });
        })
        .catch(err => console.error('Backend connection fault:', err));
    }

    // API: Trigger Row Deletion
    function deleteUser(id) {
      if(confirm("Are you sure you want to delete this user record?")) {
        fetch(`/api/users/delete/${id}`, { method: 'DELETE' })
        .then(res => res.json())
        .then(resData => {
          alert(resData.message);
          loadUserDetails();
        });
      }
    }

    // API: Edit User Profile Name
    function editUser(id, currentName) {
      let newName = prompt("Modify display name profile record:", currentName);
      if (newName && newName.trim() !== "") {
        fetch(`/api/users/edit/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newName })
        })
        .then(res => res.json())
        .then(resData => {
           alert(resData.message);
           loadUserDetails(); 
        })
        .catch(err => console.error("Error editing record:", err));
      }
    }
  </script>
</body>
</html>
