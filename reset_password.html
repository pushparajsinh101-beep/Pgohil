<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset System Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    html, body { height: 100%; margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
    .landscape-wrapper { display: flex; height: 100vh; width: 100vw; }
    .panel-brand {
      flex: 1.3;
      background: linear-gradient(135deg, rgba(44, 24, 16, 0.95) 0%, rgba(197, 62, 33, 0.9) 100%),
                  url('https://images.unsplash.com/photo-1518241353330-0f7941c2d9b5?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; color: white; text-align: center;
    }
    .panel-form { flex: 1; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; padding: 40px; }
    .form-box { width: 100%; max-width: 380px; }
    .input-custom { position: relative; }
    .input-custom i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1.1rem; }
    .form-control { border-radius: 8px; padding: 14px 14px 14px 45px; border: 1.5px solid #e2e8f0; }
    .form-control:focus { border-color: #c53e21; box-shadow: 0 0 0 4px rgba(197, 62, 33, 0.15); }
    .btn-reset { background: linear-gradient(135deg, #c53e21 0%, #f12711 100%); border: none; border-radius: 8px; padding: 13px; font-weight: 600; color: white; }
    @media (max-width: 992px) { .panel-brand { display: none; } }
  </style>
</head>
<body>

  <div class="landscape-wrapper">
    <div class="panel-brand">
      <div class="brand-icon mb-3" style="font-size: 4.5rem; color: #ff9f43;"><i class="bi bi-key-fill"></i></div>
      <h1 class="display-5 fw-bold mb-2">Credential Recovery</h1>
      <p class="lead opacity-75">Verify your registered corporate email identity to modify database security authentication keys.</p>
    </div>

    <div class="panel-form">
      <div class="form-box">
        <div class="mb-4">
          <h2 class="fw-bold mb-1" style="color: #c53e21;">Reset Password</h2>
          <p class="text-muted small">Enter your account email to establish a new password.</p>
        </div>

        <form id="reset-form">
          <div class="mb-3 input-custom">
            <input type="email" class="form-control" id="reset-email" placeholder="Email Address" required>
            <i class="bi bi-envelope-fill"></i>
          </div>

          <div class="mb-3 input-custom">
            <input type="password" class="form-control" id="reset-password" placeholder="New Password" required>
            <i class="bi bi-lock-fill"></i>
          </div>

          <div id="alert-message" class="alert d-none p-2 small text-center fw-bold" role="alert"></div>

          <button type="submit" class="btn btn-reset w-100 text-uppercase shadow-sm">
            Update Credentials <i class="bi bi-arrow-right-short ms-1"></i>
          </button>
          
          <div class="text-center mt-4">
            <a href="/login" class="text-decoration-none small fw-bold" style="color: #c53e21;"><i class="bi bi-arrow-left me-1"></i> Return to Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('reset-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const alertDiv = document.getElementById('alert-message');
      alertDiv.className = "alert d-none p-2 small text-center fw-bold";

      fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('reset-email').value,
          password: document.getElementById('reset-password').value
        })
      })
      .then(res => res.json())
      .then(data => {
        alertDiv.classList.remove('d-none');
        if(data.status === "success") {
          alertDiv.className = "alert alert-success p-2 small text-center fw-bold";
          alertDiv.innerText = data.message;
          setTimeout(() => { window.location.href = '/login'; }, 2000);
        } else {
          alertDiv.className = "alert alert-danger p-2 small text-center fw-bold";
          alertDiv.innerText = data.message;
        }
      });
    });
  </script>
</body>
</html>
